<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Recording Area</title>
    <style>
        /* 在这里定义录制区域框的样式 */
        html,
        body {
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
            margin: 0;
            padding: 0;
            background-color: rgba(0, 0, 0, .2); /* 使窗口背景透明 */
            height: 100%;
        }
        
        .recording-border {
            height: 100%;
            border: 3px solid #00ff00;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .count-down {
            display: inline-block;
            width: 150px;
            height: 150px;
            line-height: 150px;
            text-align: center;
            border-radius: 50%;
            background-color: #121821;
            color: #fff;
            font-size: 60px;
        }
    </style>
</head>
<body>
    <div class="recording-border">
        <span class="count-down"></span>
    </div>

    <script type="module">
        import { ipcRenderer } from 'electron';

        let countDown = 3;
        const countDownEl = document.querySelector('.count-down');
        const timer = setInterval(() => {
            countDownEl.innerText = countDown;
            countDown--;
            if (countDown < 0) {
                clearInterval(timer);
                ipcRenderer.send('recording-end');
            }
        }, 1000);
    </script>
</body>
</html>
